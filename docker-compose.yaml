version: '3.8'

services:
  swift_fastapi_app:
    build:
      context: .
      network: host
    container_name: swift_fastapi_server
    network_mode: host
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    environment:
      - TZ=America/Calgary
      - MYSQL_HOST=127.0.0.1
      - MYSQL_PORT=3307
    restart: always

  # [서비스용] 정식 도메인 연결 (swift-api.naranja.my)
  tunnel_api:
    image: cloudflare/cloudflared:latest
    container_name: tunnel_server
    network_mode: host
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: always

  # [데이터베이스] API용 전용 MySQL 설정
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: America/Calgary
    command: --default-time-zone=-06:00
    volumes:
      # 도커가 꺼져도 현재 폴더의 db_data 폴더에 데이터가 파일로 보존됩니다.
      - ./db_data:/var/lib/mysql

volumes:
  db_data: