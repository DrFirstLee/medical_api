version: '3.8'

services:
  fastapi_app:
    build: .
    container_name: fastapi_server
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    restart: always
    depends_on:
      - db

  # [서비스용] 무료 랜덤 도메인 사용 (trycloudflare.com)
  tunnel_api:
    image: cloudflare/cloudflared:latest
    container_name: tunnel_server
    command: tunnel --no-autoupdate --url http://fastapi_app:8000
    restart: always

  # [데이터베이스] API용 전용 MySQL 설정
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    # ports 설정을 하지 않아 외부 접근이 차단되며, 동일 네트워크(fastapi_app)에서만 접속 가능합니다.
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      # 도커가 꺼져도 현재 폴더의 db_data 폴더에 데이터가 파일로 보존됩니다.
      - ./db_data:/var/lib/mysql

volumes:
  db_data: